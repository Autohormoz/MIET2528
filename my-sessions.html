<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MIET2528 — My Sessions</title>
<style>
  :root{
    --navy:#0A0F1E;
    --card:#151d33;
    --cyan:#00BDD6;
    --amber:#F0A500;
    --teal:#1C7293;
    --ink:#C8D8F0;
    --muted:#7086a0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;
    font-family:Calibri,"Segoe UI",sans-serif;color:var(--ink);
    display:flex;justify-content:center;}
  .card{background:var(--card);border-radius:12px;padding:22px 26px;
    width:100%;max-width:640px;}
  h2{font-family:Georgia,serif;font-weight:normal;font-size:1.2rem;
    color:#ffffff;margin:0 0 12px;}
  p.dek{margin:0 0 16px;font-size:0.88rem;line-height:1.6;color:var(--muted);}

  .my-session-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .my-session-row label{flex:0 0 80px;font-size:0.9rem;font-weight:600;color:#ffffff;}
  .my-session-row select{flex:1 1 200px;padding:8px 10px;border-radius:6px;
    border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);
    color:var(--ink);font-size:0.9rem;}
  .my-session-row select option{background:var(--navy);color:var(--ink);}
  .ms-map{margin:-2px 0 12px 90px;font-size:0.85rem;}
  .ms-map a{color:var(--amber);text-decoration:none;font-weight:600;}
  .ms-map a:hover{text-decoration:underline;}

  .btn-link{display:inline-block;background:var(--cyan);color:var(--navy);
    font-weight:700;font-size:0.9rem;padding:9px 18px;border-radius:8px;
    border:none;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>
<div class="card">
  <h2>My Sessions</h2>
  <p class="dek">
    Workshops and tutorials run in multiple parallel sessions, and everyone is individually
    enrolled in their own — check Canvas if you're not sure which is yours.
    Pick your own sessions below once — this page will remember them for you from then on.
  </p>

  <div id="ms-form">
  <div class="my-session-row">
    <label>Lectorial</label>
    <select id="ms-lec"><option value="">Select your session…</option></select>
  </div>
  <div class="ms-map" id="ms-lec-map"></div>

  <div class="my-session-row">
    <label>Tutorial</label>
    <select id="ms-tut"><option value="">Select your session…</option></select>
  </div>
  <div class="ms-map" id="ms-tut-map"></div>

  <div class="my-session-row">
    <label>Workshop</label>
    <select id="ms-wk"><option value="">Select your session…</option></select>
  </div>
  <div class="ms-map" id="ms-wk-map"></div>

  <button class="btn-link" id="ms-save-btn">Save my sessions</button>
  </div>

  <div id="ms-summary" style="display:none;">
    <div id="ms-summary-lines"></div>
    <button class="btn-link" id="ms-edit-btn" style="background:transparent;border:1px solid var(--muted);color:var(--ink);">Edit my sessions</button>
  </div>

</div>

<script>
/* ------------------------------------------------------------------
   Same session data and localStorage key as the widget on week1.html,
   so a student's saved choice is shared between wherever this iframe
   is embedded and the Week 1 page itself.
   TO UPDATE FOR A NEW SEMESTER: replace the three arrays below with
   a fresh export — each entry is [code, "Day, time, room"].
------------------------------------------------------------------- */
const MS_LECTORIALS = [
  ["LTL01/03", "Tuesday, 4:30pm\u20136:30pm, room 080.02.007"],
  ["LTL01/01", "Thursday, 2:30pm\u20134:30pm, room 080.04.011"],
  ["LTL01/02", "Friday, 4:30pm\u20136:30pm, Online (Collaborate Ultra)"],
];
const MS_TUTORIALS = [
  ["TUT01/01", "Tuesday, 2:30pm\u20133:30pm, room 080.06.005"],
  ["TUT01/02", "Thursday, 12:30pm\u20131:30pm, room 080.09.012"],
  ["TUT01/03", "Wednesday, 10:30am\u201311:30am, room 080.04.019"],
  ["TUT01/04", "Friday, 12:30pm\u20131:30pm, room 056.05.085"],
  ["TUT01/05", "Tuesday, 3:30pm\u20134:30pm, room 080.04.019"],
  ["TUT01/06", "Wednesday, 1:30pm\u20132:30pm, room 056.05.085"],
  ["TUT01/07", "Wednesday, 9:30am\u201310:30am, room 080.10.017"],
  ["TUT01/08", "Friday, 2:30pm\u20133:30pm, room 080.03.015"],
  ["TUT01/09", "Wednesday, 12:30pm\u20131:30pm, room 080.06.005"],
  ["TUT01/10", "Friday, 10:30am\u201311:30am, room 056.03.093"],
];
const MS_WORKSHOPS = [
  ["WRK01/01", "Wednesday, 12:30pm\u20131:30pm, room 056.02.030"],
  ["WRK01/02", "Wednesday, 1:30pm\u20132:30pm, room 056.02.030"],
  ["WRK01/03", "Wednesday, 2:30pm\u20133:30pm, room 056.02.030"],
  ["WRK01/04", "Wednesday, 3:30pm\u20134:30pm, room 056.02.030"],
  ["WRK01/05", "Wednesday, 4:30pm\u20135:30pm, room 056.02.030"],
  ["WRK01/06", "Friday, 12:30pm\u20131:30pm, room 056.02.030"],
  ["WRK01/07", "Friday, 1:30pm\u20132:30pm, room 056.02.030"],
  ["WRK01/08", "Friday, 2:30pm\u20133:30pm, room 056.02.030"],
  ["WRK01/09", "Friday, 3:30pm\u20134:30pm, room 056.02.030"],
  ["WRK01/10", "Friday, 4:30pm\u20135:30pm, room 056.02.030"],
  ["WRK01/11", "Tuesday, 1:30pm\u20132:30pm, room 056.02.030"],
  ["WRK01/12", "Tuesday, 2:30pm\u20133:30pm, room 056.02.030"],
  ["WRK01/13", "Tuesday, 3:30pm\u20134:30pm, room 056.02.030"],
];

function msPopulate(selectEl, options) {
  options.forEach(([code, label]) => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = code + " \u2014 " + label;
    selectEl.appendChild(opt);
  });
}
const msLecEl = document.getElementById("ms-lec");
const msTutEl = document.getElementById("ms-tut");
const msWkEl = document.getElementById("ms-wk");
msPopulate(msLecEl, MS_LECTORIALS);
msPopulate(msTutEl, MS_TUTORIALS);
msPopulate(msWkEl, MS_WORKSHOPS);

/* ------------------------------------------------------------------
   MAP LINKS — the first number group in a room code is the RMIT
   building number (e.g. "room 080.02.007" -> Building 80), which
   Google Maps resolves fine as a plain search. Online sessions have
   no room code, so no link is shown for those.
------------------------------------------------------------------- */
function updateMapLink(selectEl, mapEl) {
  const label = selectEl.options[selectEl.selectedIndex]
    ? selectEl.options[selectEl.selectedIndex].textContent
    : "";
  const match = label.match(/room (\d+)\./);
  if (!match) {
    mapEl.innerHTML = "";
    return;
  }
  const building = parseInt(match[1], 10); // strips leading zeros
  const query = encodeURIComponent("RMIT University Building " + building + " Melbourne");
  mapEl.innerHTML = '<a href="https://www.google.com/maps/search/?api=1&query=' + query +
    '" target="_blank">\uD83D\uDCCD View Building ' + building + " on Google Maps</a>";
}
const msLecMap = document.getElementById("ms-lec-map");
const msTutMap = document.getElementById("ms-tut-map");
const msWkMap = document.getElementById("ms-wk-map");
msLecEl.addEventListener("change", () => updateMapLink(msLecEl, msLecMap));
msTutEl.addEventListener("change", () => updateMapLink(msTutEl, msTutMap));
msWkEl.addEventListener("change", () => updateMapLink(msWkEl, msWkMap));

const MS_KEY = "miet2528-my-sessions";
const msFormEl = document.getElementById("ms-form");
const msSummaryEl = document.getElementById("ms-summary");
const msSummaryLines = document.getElementById("ms-summary-lines");

function summaryLineFor(selectEl) {
  const opt = selectEl.options[selectEl.selectedIndex];
  if (!selectEl.value || !opt) return null;
  const label = opt.textContent.replace(/^\S+\s\u2014\s/, "");
  return "<div style=\"margin-bottom:6px;\">" + label + "</div>";
}
function showSummary() {
  const lines = [summaryLineFor(msLecEl), summaryLineFor(msTutEl), summaryLineFor(msWkEl)]
    .filter(Boolean);
  msSummaryLines.innerHTML = lines.length
    ? lines.join("")
    : "<div style=\"color:var(--muted);\">No sessions saved yet.</div>";
  msFormEl.style.display = "none";
  msSummaryEl.style.display = "block";
}
function showForm() {
  msFormEl.style.display = "block";
  msSummaryEl.style.display = "none";
}

function msLoad() {
  try {
    const saved = JSON.parse(localStorage.getItem(MS_KEY) || "{}");
    if (saved.lec) msLecEl.value = saved.lec;
    if (saved.tut) msTutEl.value = saved.tut;
    if (saved.wk) msWkEl.value = saved.wk;
    updateMapLink(msLecEl, msLecMap);
    updateMapLink(msTutEl, msTutMap);
    updateMapLink(msWkEl, msWkMap);
    if (saved.lec || saved.tut || saved.wk) {
      showSummary();
      return;
    }
  } catch (e) { /* ignore corrupt storage */ }
  updateMapLink(msLecEl, msLecMap);
  updateMapLink(msTutEl, msTutMap);
  updateMapLink(msWkEl, msWkMap);
}
function msSave() {
  const data = { lec: msLecEl.value, tut: msTutEl.value, wk: msWkEl.value };
  try {
    localStorage.setItem(MS_KEY, JSON.stringify(data));
  } catch (e) { /* ignore storage errors */ }
  showSummary();
}
document.getElementById("ms-save-btn").addEventListener("click", msSave);
document.getElementById("ms-edit-btn").addEventListener("click", showForm);
msLoad();
</script>
</body>
</html>
